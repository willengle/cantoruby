<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cantonese Jyutping Ruby Generator</title>
    <style>
        :root {
            --bg-body: #0f172a;
            --card-bg: #1e293b;
            --border-color: #334155;
            --input-bg: #0f172a;

            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --secondary: #334155;
            --secondary-hover: #475569;
            --success: #10b981;

            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --ruby-color: #dc2626;

            --radius: 12px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 850px;
        }

        header {
            margin-bottom: 28px;
            text-align: center;
        }

        header h1 {
            font-size: 1.875rem;
            font-weight: 700;
            color: var(--text-main);
            letter-spacing: -0.025em;
        }

        header p {
            color: var(--text-muted);
            margin-top: 6px;
            font-size: 0.95rem;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            padding: 24px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3), 0 4px 6px -4px rgba(0, 0, 0, 0.3);
            margin-bottom: 24px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        textarea {
            width: 100%;
            height: 140px;
            font-size: 1.1rem;
            line-height: 1.6;
            padding: 14px;
            border: 1px solid var(--border-color);
            border-radius: calc(var(--radius) - 4px);
            background-color: var(--input-bg);
            color: var(--text-main);
            resize: vertical;
            outline: none;
            transition: all 0.2s ease;
            font-family: inherit;
        }

        textarea::placeholder {
            color: #64748b;
        }

        textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.25);
        }

        .button-row {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 10px 20px;
            font-size: 0.95rem;
            font-weight: 600;
            border-radius: calc(var(--radius) - 4px);
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-primary {
            background-color: var(--primary);
            color: #ffffff;
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
        }

        .btn-secondary {
            background-color: var(--secondary);
            color: var(--text-main);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            background-color: var(--secondary-hover);
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .section-title {
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
        }

        .btn-sm {
            padding: 6px 14px;
            font-size: 0.85rem;
        }

        .btn-success {
            background-color: var(--success) !important;
            color: #ffffff !important;
        }

        /* Ruby Visual Formatting */
        .preview-content {
            font-size: 2.1rem;
            line-height: 2.8;
            word-break: break-word;
        }

        ruby {
            ruby-position: over;
            margin: 0 6px;
            vertical-align: baseline;
        }

        rt {
            font-size: 0.42em;
            font-weight: 600;
            font-family: monospace, system-ui;
            letter-spacing: 0.5px;
        }

        .punct {
            font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans SC", sans-serif;
            vertical-align: baseline;
            margin: 0 2px;
        }

        pre {
            background: #020617;
            border: 1px solid var(--border-color);
            color: #e2e8f0;
            padding: 16px;
            border-radius: calc(var(--radius) - 4px);
            overflow-x: auto;
            white-space: pre-wrap;
            word-break: break-all;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            font-size: 0.875rem;
            line-height: 1.5;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Cantonese Ruby Generator</h1>
            <p>Convert Chinese text into formatted HTML Ruby annotations with Jyutping</p>
        </header>

        <div class="card">
            <div class="input-group">
                <textarea id="inputText" placeholder="Type or paste Cantonese text here...">張美玲：歡迎你嚟溫哥華！我係美玲，你可以叫我英文名 Rachel。呢位同學，你叫咩名呀？
李宏傑：我叫 Peter，喺香港出世，但係三歲就移咗民嚟呢度。
陳志成：你有冇中文名呀？
李宏傑：有呀，我叫宏傑。
黃正男：呢個名...</textarea>
                <div class="button-row">
                    <button class="btn btn-secondary" onclick="clearText()">Clear</button>
                    <button class="btn btn-primary" onclick="convertText()">Convert to Ruby HTML</button>
                </div>
            </div>
        </div>

        <div id="resultsContainer" class="hidden">
            <div class="card">
                <div class="section-title" style="margin-bottom: 16px;">Visual Preview</div>
                <div class="preview-content" id="previewOutput"></div>
            </div>

            <div class="card">
                <div class="section-header">
                    <div class="section-title">Generated HTML Code</div>
                    <button class="btn btn-secondary btn-sm" id="copyBtn" onclick="copyCode()">Copy Code</button>
                </div>
                <pre><code id="codeOutput"></code></pre>
            </div>
        </div>
    </div>

    <script>
        // Extended embedded dictionary covering Cantonese colloquial vocabulary, general usage, and names
        const dictionary = {
            // Names & Dialogue Words from Screenshots
            "張": "zoeng1", "美": "mei5", "玲": "ling4", "歡": "fun1", "迎": "jing4", "你": "nei5",
            "嚟": "lai4", "溫": "wan1", "哥": "go1", "華": "waa4", "我": "ngo5", "係": "hai6",
            "可": "ho2", "以": "ji5", "叫": "giu3", "英": "jing1", "文": "man4", "名": "ming4",
            "呢": "nei1", "位": "wai2", "同": "tung4", "學": "hok6", "咩": "me1", "呀": "aa3",
            "李": "lei5", "宏": "wang4", "傑": "git6", "喺": "hai2", "香": "hoeng1", "港": "gong2",
            "出": "ceut1", "世": "sai3", "但": "daan6", "三": "saam1", "歲": "seui3", "就": "zau6",
            "移": "ji4", "咗": "zo2", "民": "man4", "度": "dou6", "陳": "can4", "志": "zi3",
            "成": "sing4", "有": "jau5", "冇": "mou5", "中": "zung1", "黃": "wong4", "正": "zing3",
            "男": "naam4", "個": "go3", "大": "daai6", "家": "gaa1", "好": "hou2", "啱": "ngaam1",
            "由": "jau4", "廣": "gwong2", "州": "zau1", "加": "gaa1", "拿": "naa4", "留": "lau4",
            "今": "gam1", "年": "nin4", "一": "jat1", "二": "ji6", "級": "kap1", "住": "zyu6",
            "星": "sing1", "球": "kau4", "上": "soeng5", "小": "siu2", "王": "wong4", "子": "zi2", "在": "zoi6",

            // Common Cantonese Particles, Verbs, Nouns & Pronouns
            "佢": "keoi5", "哋": "dei6", "啲": "di1", "乜": "mat1", "唔": "m4", "咁": "gam2",
            "噉": "gam2", "諗": "nam2", "睇": "tai2", "聽": "teng1", "講": "gong2", "食": "sik6",
            "飲": "jam2", "搵": "wan2", "攞": "lo2", "俾": "bei2", "緊": "gan2", "翻": "faan1",
            "返": "faan1", "屋": "uk1", "企": "kei5", "車": "ce1", "房": "fong4", "路": "lou6",
            "心": "sam1", "情": "cing4", "事": "si6", "日": "jat6", "天": "tin1", "時": "si4",
            "候": "hau6", "多": "do1", "少": "siu2", "高": "gou1", "矮": "ai2", "快": "faai3",
            "慢": "maan6", "新": "san1", "舊": "gau6", "人": "jan4", "水": "seui2", "火": "fo2",
            "山": "saan1", "海": "hoi2", "地": "dei6", "天": "tin1", "前": "cin4", "後": "hau6",
            "左": "zo2", "右": "jau6", "內": "noi6", "外": "ngoi6", "東": "dung1", "南": "naam4",
            "西": "sai1", "北": "bak1", "長": "coeng4", "短": "dyun2", "重": "cung5", "輕": "hing1",
            "買": "maai5", "賣": "maai6", "行": "haang4", "走": "zau2", "跑": "pau2", "坐": "co5",
            "開": "hoi1", "關": "gwaan1", "問": "man6", "答": "daap3", "愛": "oi3", "想": "soeng2"
        };

        const punctuationRegex = /[，。！？：；「」『』、（）—…\s]/;

        function convertText() {
            const input = document.getElementById('inputText').value;
            if (!input.trim()) return;

            let htmlParts = [];

            for (let char of input) {
                const jyutping = dictionary[char];

                if (punctuationRegex.test(char)) {
                    htmlParts.push('<span class="punct">' + char + '</span>');
                }
                else if (jyutping) {
                    htmlParts.push('<ruby>' + char + '<rt style="color: #dc2626;">' + jyutping + '</rt></ruby>');
                }
                else {
                    // English words or unknown Chinese characters output normally without breaking execution
                    htmlParts.push(char);
                }
            }

            const rubyHtml = htmlParts.join('');

            document.getElementById('previewOutput').innerHTML = rubyHtml;
            document.getElementById('codeOutput').textContent = rubyHtml;
            document.getElementById('resultsContainer').classList.remove('hidden');
        }

        function clearText() {
            document.getElementById('inputText').value = '';
            document.getElementById('inputText').focus();
            document.getElementById('resultsContainer').classList.add('hidden');
        }

        function copyCode() {
            const codeText = document.getElementById('codeOutput').textContent;
            const copyBtn = document.getElementById('copyBtn');

            navigator.clipboard.writeText(codeText).then(() => {
                copyBtn.textContent = 'Copied!';
                copyBtn.classList.add('btn-success');

                setTimeout(() => {
                    copyBtn.textContent = 'Copy Code';
                    copyBtn.classList.remove('btn-success');
                }, 2000);
            }).catch(err => {
                console.error('Failed to copy: ', err);
            });
        }
    </script>
</body>
</html>
