<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cantonese Jyutping Ruby Generator</title>
    <!-- Official ToJyutping bundle -->
    <script src="https://cdn.jsdelivr.net/npm/to-jyutping@3.1.1"></script>
    <style>
        :root {
            --bg-body: #0f172a;
            --card-bg: #1e293b;
            --border-color: #334155;
            --input-bg: #0f172a;
            
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --secondary: #334155;
            --secondary-hover: #475569;
            --success: #10b981;
            --error-bg: #991b1b;
            
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --ruby-color: #dc2626;
            
            --radius: 12px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 850px;
        }

        header {
            margin-bottom: 28px;
            text-align: center;
        }

        header h1 {
            font-size: 1.875rem;
            font-weight: 700;
            color: var(--text-main);
            letter-spacing: -0.025em;
        }

        header p {
            color: var(--text-muted);
            margin-top: 6px;
            font-size: 0.95rem;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            padding: 24px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3), 0 4px 6px -4px rgba(0, 0, 0, 0.3);
            margin-bottom: 24px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        textarea {
            width: 100%;
            height: 140px;
            font-size: 1.1rem;
            line-height: 1.6;
            padding: 14px;
            border: 1px solid var(--border-color);
            border-radius: calc(var(--radius) - 4px);
            background-color: var(--input-bg);
            color: var(--text-main);
            resize: vertical;
            outline: none;
            transition: all 0.2s ease;
            font-family: inherit;
        }

        textarea::placeholder {
            color: #64748b;
        }

        textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.25);
        }

        .button-row {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 10px 20px;
            font-size: 0.95rem;
            font-weight: 600;
            border-radius: calc(var(--radius) - 4px);
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-primary {
            background-color: var(--primary);
            color: #ffffff;
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
        }

        .btn-secondary {
            background-color: var(--secondary);
            color: var(--text-main);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            background-color: var(--secondary-hover);
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .section-title {
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
        }

        .btn-sm {
            padding: 6px 14px;
            font-size: 0.85rem;
        }

        .btn-success {
            background-color: var(--success) !important;
            color: #ffffff !important;
        }

        .error-banner {
            background-color: var(--error-bg);
            color: #ffffff;
            padding: 12px 16px;
            border-radius: calc(var(--radius) - 4px);
            margin-bottom: 16px;
            font-size: 0.9rem;
        }

        /* Ruby Visual Layout */
        .preview-content {
            font-size: 2.1rem;
            line-height: 2.8;
            word-break: break-word;
        }

        ruby {
            ruby-position: over;
            margin: 0 6px;
            vertical-align: baseline;
        }

        rt {
            font-size: 0.42em;
            font-weight: 600;
            font-family: monospace, system-ui;
            letter-spacing: 0.5px;
        }

        .punct {
            font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans SC", sans-serif;
            vertical-align: baseline;
            margin: 0 2px;
        }

        pre {
            background: #020617;
            border: 1px solid var(--border-color);
            color: #e2e8f0;
            padding: 16px;
            border-radius: calc(var(--radius) - 4px);
            overflow-x: auto;
            white-space: pre-wrap;
            word-break: break-all;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            font-size: 0.875rem;
            line-height: 1.5;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Cantonese Ruby Generator</h1>
            <p>Convert Chinese text into formatted HTML Ruby annotations with Jyutping</p>
        </header>

        <div id="errorContainer" class="error-banner hidden"></div>

        <div class="card">
            <div class="input-group">
                <textarea id="inputText" placeholder="Type or paste Cantonese text here...">張美玲：歡迎你嚟溫哥華！我係美玲，你可以叫我英文名 Rachel。呢位同學，你叫咩名呀？</textarea>
                <div class="button-row">
                    <button class="btn btn-secondary" id="clearBtn">Clear</button>
                    <button class="btn btn-primary" id="convertBtn">Convert to Ruby HTML</button>
                </div>
            </div>
        </div>

        <div id="resultsContainer" class="hidden">
            <div class="card">
                <div class="section-title" style="margin-bottom: 16px;">Visual Preview</div>
                <div class="preview-content" id="previewOutput"></div>
            </div>

            <div class="card">
                <div class="section-header">
                    <div class="section-title">Generated HTML Code</div>
                    <button class="btn btn-secondary btn-sm" id="copyBtn">Copy Code</button>
                </div>
                <pre><code id="codeOutput"></code></pre>
            </div>
        </div>
    </div>

    <script>
        const punctuationRegex = /[，。！？：；「」『』、（）—…\s]/;

        function showError(msg) {
            const errBox = document.getElementById('errorContainer');
            errBox.textContent = msg;
            errBox.classList.remove('hidden');
        }

        function clearError() {
            const errBox = document.getElementById('errorContainer');
            errBox.textContent = '';
            errBox.classList.add('hidden');
        }

        function convertText() {
            clearError();
            const input = document.getElementById('inputText').value;
            if (!input.trim()) return;

            if (typeof window.ToJyutping === 'undefined' || typeof window.ToJyutping.getJyutpingList !== 'function') {
                showError('Error: ToJyutping library failed to load. Please check your internet connection.');
                return;
            }

            let htmlParts = [];
            
            try {
                const list = window.ToJyutping.getJyutpingList(input);

                for (const item of list) {
                    const char = item[0];
                    const jyutping = item[1];

                    if (punctuationRegex.test(char)) {
                        htmlParts.push('<span class="punct">' + char + '</span>');
                    } else if (jyutping) {
                        htmlParts.push('<ruby>' + char + '<rt style="color: #dc2626;">' + jyutping + '</rt></ruby>');
                    } else {
                        htmlParts.push(char);
                    }
                }
            } catch (err) {
                console.error("Error generating Jyutping:", err);
                showError('Execution error: ' + err.message);
                return;
            }

            const rubyHtml = htmlParts.join('');

            document.getElementById('previewOutput').innerHTML = rubyHtml;
            document.getElementById('codeOutput').textContent = rubyHtml;
            document.getElementById('resultsContainer').classList.remove('hidden');
        }

        function clearText() {
            clearError();
            document.getElementById('inputText').value = '';
            document.getElementById('inputText').focus();
            document.getElementById('resultsContainer').classList.add('hidden');
        }

        function copyCode() {
            const codeText = document.getElementById('codeOutput').textContent;
            const copyBtn = document.getElementById('copyBtn');

            navigator.clipboard.writeText(codeText).then(() => {
                copyBtn.textContent = 'Copied!';
                copyBtn.classList.add('btn-success');

                setTimeout(() => {
                    copyBtn.textContent = 'Copy Code';
                    copyBtn.classList.remove('btn-success');
                }, 2000);
            }).catch(err => {
                console.error('Failed to copy: ', err);
            });
        }

        document.getElementById('convertBtn').addEventListener('click', convertText);
        document.getElementById('clearBtn').addEventListener('click', clearText);
        document.getElementById('copyBtn').addEventListener('click', copyCode);
    </script>
</body>
</html>
